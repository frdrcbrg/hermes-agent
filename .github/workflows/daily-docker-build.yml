name: Daily Docker Build

on:
  schedule:
    # Build once per day at 03:17 UTC.
    - cron: '17 3 * * *'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

concurrency:
  group: daily-docker-build-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/hermes-agent
  UPSTREAM_REPOSITORY: https://github.com/NousResearch/hermes-agent.git

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Sync from upstream
        id: sync
        if: github.ref_name == github.event.repository.default_branch
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote add upstream "$UPSTREAM_REPOSITORY"
          git fetch upstream "${GITHUB_REF_NAME}"
          if git merge --no-edit "upstream/${GITHUB_REF_NAME}"; then
            if [ -n "$(git status --porcelain)" ]; then
              echo "Unexpected dirty worktree after upstream merge" >&2
              git status --short >&2
              exit 1
            fi
            git submodule sync --recursive
            git submodule update --init --recursive
            if [ "$(git rev-parse HEAD)" != "${GITHUB_SHA}" ]; then
              git push origin "HEAD:${GITHUB_REF_NAME}"
            fi
          else
            echo "Upstream sync failed due to merge conflicts. Resolve them manually, then rerun this workflow." >&2
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        run: |
          set -euo pipefail
          date_tag="$(date -u +'%Y%m%d')"
          revision="$(git rev-parse HEAD)"
          short_sha="${revision::12}"
          echo "revision=${revision}" >> "$GITHUB_OUTPUT"
          {
            echo 'tags<<EOF'
            echo "${IMAGE_NAME}:daily"
            echo "${IMAGE_NAME}:daily-${date_tag}"
            echo "${IMAGE_NAME}:sha-${short_sha}"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7.1.0
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ steps.tags.outputs.revision }}
          cache-from: type=gha,scope=daily-docker
          cache-to: type=gha,mode=max,scope=daily-docker
